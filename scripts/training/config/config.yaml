model:
  model_name_or_path: ../models/Qwen3-1.7B

data:
  input_labels: ../../config/complexity_labels.jsonl
  processed_dir: data
  split_seed: 42

lora:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  max_seq_length: 448
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  per_device_eval_batch_size: 1
  learning_rate: 7e-5
  num_train_epochs: 2
  max_grad_norm: 0.5
  fp16: false
  bf16: true
  load_in_4bit: false
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: nf4
  gradient_checkpointing: false
  device_map: cuda:0
  optim: adamw_torch_fused
  logging_steps: 100
  save_steps: 2000
  eval_steps: 2000
  save_total_limit: 2
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  report_to: tensorboard
  run_name: qwen3-lora-8gb
  logging_nan_inf_filter: true
  vram_limit_gb: 7.95

inference:
  max_new_tokens: 192
  temperature: 0.0
  top_p: 1.0

output:
  adapter_dir: output/adapter
  tensorboard_dir: output/tensorboard
